<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>臺北農產 第一果菜市場 — 3D 巡檢地圖</title>
<style>
:root{--bg:#020b18;--panel:#041428;--border:#0a3a5a;--cyan:#00d4ff;--cyan2:#00a8cc;--green:#00ff88;--red:#ff3366;--yellow:#ffd700;--text:#b0d8f0;--text2:#5a8ab0}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh}
#topbar{position:fixed;top:0;left:0;right:0;height:50px;background:rgba(2,11,24,.97);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;z-index:200}
.tb-logo{font-size:13px;font-weight:700;color:var(--cyan);white-space:nowrap}
.tb-sep{width:1px;height:24px;background:var(--border)}
.tb-title{font-size:11px;color:var(--text2)}
.tb-space{flex:1}
.tb-btn{background:var(--border);border:1px solid var(--cyan2);color:var(--cyan);padding:4px 11px;border-radius:3px;cursor:pointer;font-size:11px;transition:background .2s}
.tb-btn:hover{background:#0a3a5a}
.tb-back{color:var(--text2);border-color:var(--border);text-decoration:none;display:inline-flex;align-items:center;padding:4px 10px;border:1px solid var(--border);border-radius:3px;font-size:11px;transition:all .2s}
.tb-back:hover{border-color:var(--cyan);color:var(--cyan)}

/* Floor nav */
#floor-nav{position:fixed;right:14px;top:60px;background:rgba(4,20,40,.95);border:1px solid var(--border);border-radius:6px;z-index:150;overflow:hidden}
.fn-btn{display:block;width:100%;padding:8px 18px;background:none;border:none;border-bottom:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:11px;text-align:center;transition:all .15s;white-space:nowrap}
.fn-btn:last-child{border-bottom:none}
.fn-btn:hover{background:rgba(0,212,255,.08);color:var(--cyan)}
.fn-btn.active{background:rgba(0,212,255,.18);color:var(--cyan);font-weight:700}

/* Stats */
#stats{position:fixed;left:14px;top:60px;background:rgba(4,20,40,.95);border:1px solid var(--border);border-radius:6px;padding:10px 14px;z-index:150;min-width:150px}
.st-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:11px}
.st-row:last-child{margin-bottom:0}
.st-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.st-lbl{color:var(--text2);flex:1}
.st-val{font-weight:700;font-size:12px}

/* Info panel */
#infopanel{position:fixed;left:14px;bottom:14px;background:rgba(4,20,40,.97);border:1px solid var(--border);border-radius:6px;padding:12px 14px;z-index:150;min-width:210px;max-width:260px;display:none;box-shadow:0 0 20px rgba(0,212,255,.1)}
#infopanel.show{display:block}
.ip-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.ip-name{font-size:13px;font-weight:700;color:var(--cyan)}
.ip-x{background:none;border:none;color:var(--text2);cursor:pointer;font-size:15px;line-height:1;padding:0 2px}
.ip-x:hover{color:var(--text)}
.ip-row{font-size:11px;color:var(--text2);margin-bottom:3px}
.ip-row span{color:var(--text)}
.ip-status{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;margin-top:5px}
.ip-green{background:rgba(0,255,136,.12);color:var(--green)}
.ip-red{background:rgba(255,51,102,.12);color:var(--red)}
.ip-yellow{background:rgba(255,215,0,.12);color:var(--yellow)}
.ip-btn{display:block;width:100%;margin-top:9px;padding:6px;background:rgba(0,212,255,.09);border:1px solid var(--cyan2);color:var(--cyan);border-radius:3px;cursor:pointer;font-size:11px;text-align:center;text-decoration:none;transition:background .2s}
.ip-btn:hover{background:rgba(0,212,255,.2)}

/* Controls hint */
#hint{position:fixed;bottom:14px;right:14px;font-size:10px;color:var(--text2);z-index:150;text-align:right;line-height:1.9}

/* 3D container */
#c3d{position:fixed;inset:50px 0 0 0}
#c3d canvas{width:100%!important;height:100%!important}

/* 2D container */
#c2d-wrap{position:fixed;inset:50px 0 0 0;display:none;background:var(--bg)}
#c2d{display:block;width:100%;height:100%}

/* 2D toolbar */
#c2d-bar{position:fixed;left:14px;bottom:14px;display:none;gap:6px;z-index:160;flex-direction:column;align-items:flex-start}
#c2d-bar.show{display:flex}
.c2d-btn{background:rgba(4,20,40,.95);border:1px solid var(--border);color:var(--cyan2);padding:5px 12px;border-radius:3px;cursor:pointer;font-size:11px;transition:all .2s;white-space:nowrap}
.c2d-btn:hover{border-color:var(--cyan);color:var(--cyan)}

/* 2D floor label */
#c2d-label{position:fixed;left:50%;transform:translateX(-50%);top:60px;background:rgba(4,20,40,.92);border:1px solid var(--border);border-radius:4px;padding:5px 20px;font-size:12px;color:var(--cyan);font-weight:700;z-index:160;display:none;pointer-events:none}
#c2d-label.show{display:block}
#c2d-zoom{position:fixed;right:14px;bottom:14px;background:rgba(4,20,40,.88);border:1px solid var(--border);border-radius:3px;padding:4px 10px;font-size:10px;color:var(--text2);z-index:160;display:none}
#c2d-zoom.show{display:block}

/* Loading */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:14px}
.ld-t{font-size:13px;color:var(--cyan);letter-spacing:.1em}
.ld-bar{width:200px;height:2px;background:var(--border);border-radius:2px}
.ld-fill{height:100%;background:var(--cyan);border-radius:2px;width:0%;transition:width .3s}
.ld-m{font-size:11px;color:var(--text2)}
</style>

// ─── HULL UTILS ───────────────────────────────────────────────────────────────
function inHull(px, pz) {
  let inside = false;
  for (let i=0,j=HULL.length-1;i<HULL.length;j=i++) {
    const [xi,zi]=HULL[i],[xj,zj]=HULL[j];
    if (((zi>pz)!==(zj>pz))&&(px<(xj-xi)*(pz-zi)/(zj-zi)+xi)) inside=!inside;
  }
  return inside;
}

  renderer.domElement.addEventListener('click',on3DClick);
  renderer.domElement.addEventListener('contextmenu',e=>e.preventDefault());
}

function on3DResize(){
  camera.aspect=window.innerWidth/(window.innerHeight-50);
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight-50);
}

// ── Orbit ──
const orb={theta:-0.3,phi:0.88,r:165,tx:0,ty:5,tz:0,down:false,right:false,sx:0,sy:0,minPhi:.12,maxPhi:1.46,minR:28,maxR:360};
function setupOrbit(){
  const el=renderer.domElement;
  el.addEventListener('mousedown',e=>{
    if(e.button===0){orb.down=true;orb.sx=e.clientX;orb.sy=e.clientY;}
    if(e.button===2){orb.right=true;orb.sx=e.clientX;orb.sy=e.clientY;}
  });
  window.addEventListener('mouseup',()=>{orb.down=false;orb.right=false;});
  window.addEventListener('mousemove',e=>{
    if(orb.down){
      orb.theta-=(e.clientX-orb.sx)*0.005;
      orb.phi=Math.max(orb.minPhi,Math.min(orb.maxPhi,orb.phi-(e.clientY-orb.sy)*0.005));
      orb.sx=e.clientX;orb.sy=e.clientY;
    }
    if(orb.right){
      const dx=(e.clientX-orb.sx)*0.09,dy=(e.clientY-orb.sy)*0.09;
      const ct=Math.cos(orb.theta),st=Math.sin(orb.theta);
      orb.tx-=ct*dx;orb.tz-=st*dx;orb.ty+=dy;
      orb.sx=e.clientX;orb.sy=e.clientY;
    }
  });
  el.addEventListener('wheel',e=>{
    orb.r=Math.max(orb.minR,Math.min(orb.maxR,orb.r+e.deltaY*0.15));
    e.preventDefault();
  },{passive:false});
  // Touch
  let tch=[],pd=0;
  el.addEventListener('touchstart',e=>{
    tch=Array.from(e.touches);
    if(tch.length===1){orb.down=true;orb.sx=tch[0].clientX;orb.sy=tch[0].clientY;}
    if(tch.length===2){orb.down=false;pd=Math.hypot(tch[0].clientX-tch[1].clientX,tch[0].clientY-tch[1].clientY);}
  },{passive:true});
  el.addEventListener('touchmove',e=>{
    const t=Array.from(e.touches);
    if(t.length===1&&orb.down){
      orb.theta-=(t[0].clientX-orb.sx)*0.005;
      orb.phi=Math.max(orb.minPhi,Math.min(orb.maxPhi,orb.phi-(t[0].clientY-orb.sy)*0.005));
      orb.sx=t[0].clientX;orb.sy=t[0].clientY;
    }
    if(t.length===2){
      const d=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
      orb.r=Math.max(orb.minR,Math.min(orb.maxR,orb.r-(d-pd)*0.5));pd=d;
    }
    e.preventDefault();
  },{passive:false});
  el.addEventListener('touchend',()=>{orb.down=false;});
}

function updateCam(){
  const x=orb.tx+orb.r*Math.sin(orb.phi)*Math.sin(orb.theta);
  const y=orb.ty+orb.r*Math.cos(orb.phi);
  const z=orb.tz+orb.r*Math.sin(orb.phi)*Math.cos(orb.theta);
  camera.position.set(x,y,z);
  camera.lookAt(orb.tx,orb.ty,orb.tz);
}

// ── Hull scan helpers ──
function hullXRange(z){
  let mn=200,mx=-200;
  for(let x=-55;x<=55;x+=.5) if(inHull(x,z)){mn=Math.min(mn,x);mx=Math.max(mx,x);}
  return mn<=mx?[mn,mx]:null;
}
function hullZRange(x){
  let mn=200,mx=-200;
  for(let z=-42;z<=37;z+=.5) if(inHull(x,z)){mn=Math.min(mn,z);mx=Math.max(mx,z);}
  return mn<=mx?[mn,mx]:null;
}

// ── Structural geometry helpers ──
function addHullSlab(y,depth,fillCol,fillOp,edgeCol){
  const shape=new THREE.Shape(HULL.map(p=>new THREE.Vector2(p[0],p[1])));
  const geo=new THREE.ExtrudeGeometry(shape,{depth,bevelEnabled:false});
  const mat=new THREE.MeshBasicMaterial({color:fillCol,transparent:true,opacity:fillOp,side:THREE.DoubleSide,depthWrite:false});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.rotation.x=-Math.PI/2;
  mesh.position.y=y;
  mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo),new THREE.LineBasicMaterial({color:edgeCol})));
  scene.add(mesh);
}

function addWall3D(x1,z1,x2,z2,yBase,h,thick,fillCol,fillOp,edgeCol){
  const len=Math.sqrt((x2-x1)**2+(z2-z1)**2);
  if(len<.5) return;
  const geo=new THREE.BoxGeometry(len,h,thick);
  const mat=new THREE.MeshBasicMaterial({color:fillCol,transparent:true,opacity:fillOp,depthWrite:false,side:THREE.DoubleSide});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.set((x1+x2)/2,yBase+h/2,(z1+z2)/2);
  mesh.rotation.y=-Math.atan2(z2-z1,x2-x1);
  mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo),new THREE.LineBasicMaterial({color:edgeCol})));
  scene.add(mesh);
}

function addBeam3D(x1,z1,x2,z2,y,bw,bh,fillCol,fillOp,edgeCol){
  const len=Math.sqrt((x2-x1)**2+(z2-z1)**2);
  if(len<1) return;
  const geo=new THREE.BoxGeometry(len,bh,bw);
  const mat=new THREE.MeshBasicMaterial({color:fillCol,transparent:true,opacity:fillOp,depthWrite:false});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.set((x1+x2)/2,y-bh/2,(z1+z2)/2);
  mesh.rotation.y=-Math.atan2(z2-z1,x2-x1);
  mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo),new THREE.LineBasicMaterial({color:edgeCol})));
  scene.add(mesh);
}

function addCol3D(x,z,yBase,h,size,fillCol,fillOp,edgeCol){
  const geo=new THREE.BoxGeometry(size,h,size);
  const mat=new THREE.MeshBasicMaterial({color:fillCol,transparent:true,opacity:fillOp,depthWrite:false});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.set(x,yBase+h/2,z);
  mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo),new THREE.LineBasicMaterial({color:edgeCol})));
  scene.add(mesh);
}

// ── Build 3D scene ──
function build3D(){
  // Ground plane
  const ground=new THREE.Mesh(new THREE.PlaneGeometry(400,400),new THREE.MeshBasicMaterial({color:0x010810}));
  ground.rotation.x=-Math.PI/2; ground.position.y=-5;
  scene.add(ground);

  const topElev=FLOORS[FLOORS.length-1].elev+FH;

  FLOORS.forEach(fl=>{
    const y0=fl.elev, y1=fl.elev+FH;

    // ── Floor slab (0.3 m thick, extruded hull) ──
    addHullSlab(y0-0.3, 0.3, 0x001a33,0.22, 0x00a8cc);

    // ── Outer perimeter walls (full floor height) ──
    HULL.forEach((p,i)=>{
      const np=HULL[(i+1)%HULL.length];
      addWall3D(p[0],p[1],np[0],np[1], y0,FH, 0.45, 0x001a33,0.28, 0x00d4ff);
    });

    // ── Main zone-divider walls ──
    fl.walls.forEach(w=>{
      addWall3D(w[0],w[1],w[2],w[3], y0,FH*0.95, 0.22, 0x001122,0.18, 0x004f88);
    });

    // ── Sub-zone partition walls (lighter) ──
    fl.sub&&fl.sub.forEach(sz=>{
      const {x,z,w,d}=sz;
      addWall3D(x,   z,   x+w, z,   y0,FH*0.85,0.14,0x001122,0.10,0x003344);
      addWall3D(x+w, z,   x+w, z+d, y0,FH*0.85,0.14,0x001122,0.10,0x003344);
      addWall3D(x+w, z+d, x,   z+d, y0,FH*0.85,0.14,0x001122,0.10,0x003344);
      addWall3D(x,   z+d, x,   z,   y0,FH*0.85,0.14,0x001122,0.10,0x003344);
    });

    // ── Structural beams at ceiling — X direction ──
    for(let gz=-36;gz<=32;gz+=9){
      const xr=hullXRange(gz);
      if(xr) addBeam3D(xr[0],gz,xr[1],gz, y1, 0.45,0.55, 0x001122,0.25, 0x004466);
    }
    // ── Structural beams at ceiling — Z direction ──
    for(let gx=-45;gx<=45;gx+=10){
      const zr=hullZRange(gx);
      if(zr) addBeam3D(gx,zr[0],gx,zr[1], y1, 0.45,0.55, 0x001122,0.25, 0x004466);
    }

    // ── Subtle floor reference grid ──
    const gmat=new THREE.LineBasicMaterial({color:0x071a28,transparent:true,opacity:.42});
    for(let gx=-48;gx<=48;gx+=10){
      const pts=[new THREE.Vector3(gx,y0+.05,-35),new THREE.Vector3(gx,y0+.05,30)];
      scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),gmat));
    }
    for(let gz=-35;gz<=30;gz+=9){
      const pts=[new THREE.Vector3(-48,y0+.05,gz),new THREE.Vector3(48,y0+.05,gz)];
      scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),gmat));
    }
  });

  // ── Structural columns — full building height ──
  const totalH=topElev-FLOORS[0].elev;
  const yBase=FLOORS[0].elev;
  for(let x=-45;x<=45;x+=10)
    for(let z=-33;z<=30;z+=9)
      if(inHull(x,z)) addCol3D(x,z,yBase,totalH,0.85, 0x001122,0.40, 0x00aabb);

  // ── Roof slab (0.35 m thick) ──
  addHullSlab(topElev-0.35, 0.35, 0x002244,0.20, 0x00d4ff);

  // ── Parapet walls ──
  HULL.forEach((p,i)=>{
    const np=HULL[(i+1)%HULL.length];
    addWall3D(p[0],p[1],np[0],np[1], topElev,1.3, 0.35, 0x002244,0.22, 0x00ccee);
  });
}

function makeLine(pts,color,opacity=1){
  const geo=new THREE.BufferGeometry().setFromPoints(pts);
  const mat=new THREE.LineBasicMaterial({color,transparent:opacity<1,opacity});
  return new THREE.Line(geo,mat);
}

// ── Equipment markers in 3D ──
function addEq3D(){
  eq3dMeshes.forEach(({sph,grp})=>{scene.remove(sph);scene.remove(grp);});
  eq3dMeshes=[];

  const byFloor={};
  FLOORS.forEach(f=>{byFloor[f.id]=[];});
  allEquip.forEach(eq=>{
    const fid=eqFloor(eq);
    (byFloor[fid]||(byFloor['1F'])).push(eq);
  });

  FLOORS.forEach(fl=>{
    const eqs=byFloor[fl.id]||[];
    const cols=Math.max(1,Math.ceil(Math.sqrt(eqs.length)));
    eqs.forEach((eq,i)=>{
      const px=-40+(i%cols)*13, pz=-28+Math.floor(i/cols)*13, py=fl.elev+.5;
      const col=eqColor(eq);
      const g=new THREE.Group();

      const ring=new THREE.Mesh(new THREE.RingGeometry(1.3,1.8,18),new THREE.MeshBasicMaterial({color:col,side:THREE.DoubleSide,transparent:true,opacity:.85}));
      ring.rotation.x=-Math.PI/2; ring.position.set(px,py,pz); g.add(ring);

      const dot=new THREE.Mesh(new THREE.CircleGeometry(.75,18),new THREE.MeshBasicMaterial({color:col,side:THREE.DoubleSide}));
      dot.rotation.x=-Math.PI/2; dot.position.set(px,py+.02,pz); g.add(dot);

      const beam=makeLine([new THREE.Vector3(px,py,pz),new THREE.Vector3(px,py+4,pz)],col,.3);
      g.add(beam);
      scene.add(g);

      // invisible click sphere
      const sph=new THREE.Mesh(new THREE.SphereGeometry(2,6,6),new THREE.MeshBasicMaterial({visible:false}));
      sph.position.set(px,py+.5,pz);
      sph.userData={eq,isEq:true};
      scene.add(sph);
      eq3dMeshes.push({sph,grp:g,eq,col});
    });
  });
}

function on3DClick(e){
  if(Math.abs(e.clientX-orb.sx)>6) return;
  mouse3d.x=(e.clientX/window.innerWidth)*2-1;
  mouse3d.y=-((e.clientY-50)/(window.innerHeight-50))*2+1;
  raycaster.setFromCamera(mouse3d,camera);
  const hits=raycaster.intersectObjects(eq3dMeshes.map(m=>m.sph));
  if(hits.length>0) showInfo(hits[0].object.userData.eq);
  else closeInfo();
}

let animId;
function animate3D(){
  animId=requestAnimationFrame(animate3D);
  updateCam();
  const t=Date.now()*.001;
  eq3dMeshes.forEach(({grp})=>{
    if(grp.children[0]) grp.children[0].scale.setScalar(.85+.15*Math.sin(t*2+grp.id*.5));
  });
  renderer.render(scene,camera);
}

// ─── 2D CANVAS ENGINE ────────────────────────────────────────────────────────
let canvas2d,ctx2d;
let pan={x:0,y:0}, zoom=1, baseScale=1;
let isPanning=false, panStart={x:0,y:0};
let isPinching=false, pinchDist=0;
let clickStart2d={x:0,y:0};

function initCanvas2D(){
  canvas2d=document.getElementById('c2d');
  ctx2d=canvas2d.getContext('2d');
  resizeCanvas2D();
  window.addEventListener('resize',resizeCanvas2D);
  setupPan2D();
}

function resizeCanvas2D(){
  canvas2d.width=window.innerWidth;
  canvas2d.height=window.innerHeight-50;
  // base scale: fit building (100w x 69h) into view with padding
  baseScale=Math.min(canvas2d.width,canvas2d.height)*.78/100;
  if(viewMode==='2d') draw2D();
}

function setupPan2D(){
  canvas2d.addEventListener('wheel',e=>{
    e.preventDefault();
    zoom2DAt(e.clientX,e.clientY-50,e.deltaY<0?1.12:.89);
  },{passive:false});

  canvas2d.addEventListener('mousedown',e=>{
    if(e.button===0){isPanning=true;panStart={x:e.clientX-pan.x,y:e.clientY-50-pan.y};}
    clickStart2d={x:e.clientX,y:e.clientY};
  });
  window.addEventListener('mouseup',e=>{
    if(isPanning){
      isPanning=false;
      // click detection
      if(Math.abs(e.clientX-clickStart2d.x)<5&&Math.abs(e.clientY-clickStart2d.y)<5&&viewMode==='2d'){
        handle2DClick(e.clientX,e.clientY-50);
      }
    }
  });
  window.addEventListener('mousemove',e=>{
    if(isPanning){pan.x=e.clientX-panStart.x;pan.y=(e.clientY-50)-panStart.y;draw2D();}
  });

  // touch
  canvas2d.addEventListener('touchstart',e=>{
    const t=Array.from(e.touches);
    if(t.length===1){isPanning=true;panStart={x:t[0].clientX-pan.x,y:t[0].clientY-50-pan.y};clickStart2d={x:t[0].clientX,y:t[0].clientY};}
    if(t.length===2){isPanning=false;isPinching=true;pinchDist=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);}
  },{passive:true});
  canvas2d.addEventListener('touchmove',e=>{
    const t=Array.from(e.touches);
    if(t.length===1&&isPanning){pan.x=t[0].clientX-panStart.x;pan.y=(t[0].clientY-50)-panStart.y;draw2D();}
    if(t.length===2&&isPinching){
      const d=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
      const mx=(t[0].clientX+t[1].clientX)/2, my=(t[0].clientY+t[1].clientY)/2-50;
      zoom2DAt(mx,my,d/pinchDist);pinchDist=d;
    }
    e.preventDefault();
  },{passive:false});
  canvas2d.addEventListener('touchend',e=>{
    if(e.changedTouches.length===1&&isPanning){
      const t=e.changedTouches[0];
      if(Math.abs(t.clientX-clickStart2d.x)<8&&Math.abs(t.clientY-clickStart2d.y)<8&&viewMode==='2d')
        handle2DClick(t.clientX,t.clientY-50);
    }
    isPanning=false;isPinching=false;
  });
}

function zoom2DAt(cx,cy,factor){
  const newZ=Math.max(.25,Math.min(10,zoom*factor));
  // keep world point under cursor
  const wx=(cx-canvas2d.width/2-pan.x)/(baseScale*zoom);
  const wy=(cy-canvas2d.height/2-pan.y)/(baseScale*zoom);
  zoom=newZ;
  pan.x=cx-canvas2d.width/2-wx*baseScale*zoom;
  pan.y=cy-canvas2d.height/2-wy*baseScale*zoom;
  draw2D();
  document.getElementById('c2d-zoom').textContent='縮放 '+(zoom*100|0)+'%';
}

function zoom2DBtn(f){ zoom2DAt(canvas2d.width/2,canvas2d.height/2,f); }

function w2c(wx,wz){ // world → canvas
  return [canvas2d.width/2+pan.x+wx*baseScale*zoom, canvas2d.height/2+pan.y+wz*baseScale*zoom];
}

function c2w(cx,cy){ // canvas → world
  return [(cx-canvas2d.width/2-pan.x)/(baseScale*zoom),(cy-canvas2d.height/2-pan.y)/(baseScale*zoom)];
}

function sc(v){ return v*baseScale*zoom; } // scale value

function resetView2D(){
  zoom=1; pan={x:0,y:0};
  document.getElementById('c2d-zoom').textContent='縮放 100%';
  draw2D();
}

function draw2D(){
  if(!ctx2d||viewMode!=='2d') return;
  const W=canvas2d.width,H=canvas2d.height;
  const fl=FLOORS[currentFI];
  ctx2d.clearRect(0,0,W,H);

  // Background grid
  ctx2d.fillStyle='#020b18';
  ctx2d.fillRect(0,0,W,H);
  ctx2d.strokeStyle='rgba(0,212,255,0.04)';
  ctx2d.lineWidth=1;
  const gs=sc(10);
  if(gs>8){
    const ox=((W/2+pan.x)%gs+gs)%gs, oy=((H/2+pan.y)%gs+gs)%gs;
    for(let x=ox-gs;x<W;x+=gs){ctx2d.beginPath();ctx2d.moveTo(x,0);ctx2d.lineTo(x,H);ctx2d.stroke();}
    for(let y=oy-gs;y<H;y+=gs){ctx2d.beginPath();ctx2d.moveTo(0,y);ctx2d.lineTo(W,y);ctx2d.stroke();}
  }

  // Build hull canvas path
  const hullCanv=HULL.map(p=>w2c(p[0],p[1]));

  // Building shadow/base
  ctx2d.save();
  ctx2d.beginPath();
  hullCanv.forEach(([x,y],i)=>i?ctx2d.lineTo(x,y):ctx2d.moveTo(x,y));
  ctx2d.closePath();
  ctx2d.fillStyle='rgba(1,12,28,.6)';
  ctx2d.fill();

  // Clip to building hull for interior content
  ctx2d.beginPath();
  hullCanv.forEach(([x,y],i)=>i?ctx2d.lineTo(x,y):ctx2d.moveTo(x,y));
  ctx2d.closePath();
  ctx2d.clip();

  // Sub-zones (background detail)
  fl.sub&&fl.sub.forEach(z=>{
    const tp=ZT[z.t]||ZT.market;
    const [x1,y1]=w2c(z.x,z.z),[x2,y2]=w2c(z.x+z.w,z.z+z.d);
    ctx2d.fillStyle=tp.f.replace('.42)','.22)');
    ctx2d.fillRect(x1,y1,x2-x1,y2-y1);
    ctx2d.strokeStyle=tp.b.replace('#','#')+'55';
    ctx2d.setLineDash([sc(1.5),sc(1.5)]);
    ctx2d.lineWidth=Math.max(.5,sc(.06));
    ctx2d.strokeRect(x1,y1,x2-x1,y2-y1);
    ctx2d.setLineDash([]);
  });

  // Main zones
  fl.zones.forEach(z=>{
    const tp=ZT[z.t]||ZT.market;
    const [x1,y1]=w2c(z.x,z.z),[x2,y2]=w2c(z.x+z.w,z.z+z.d);
    ctx2d.fillStyle=tp.f;
    ctx2d.fillRect(x1,y1,x2-x1,y2-y1);
  });

  // Internal zone divider walls
  fl.walls.forEach(w=>{
    const [x1,y1]=w2c(w[0],w[1]),[x2,y2]=w2c(w[2],w[3]);
    ctx2d.beginPath();ctx2d.moveTo(x1,y1);ctx2d.lineTo(x2,y2);
    ctx2d.strokeStyle='rgba(0,180,220,.55)';
    ctx2d.lineWidth=Math.max(1,sc(.18));
    ctx2d.stroke();
  });

  // Structural columns
  const cSize=Math.max(2,sc(.45));
  ctx2d.fillStyle='#0099bb';
  ctx2d.strokeStyle='#00d4ff';
  ctx2d.lineWidth=Math.max(.5,sc(.07));
  for(let cx=-45;cx<=45;cx+=10){
    for(let cz=-33;cz<=30;cz+=9){
      if(!inHull(cx,cz)) continue;
      const [px,py]=w2c(cx,cz);
      ctx2d.fillRect(px-cSize/2,py-cSize/2,cSize,cSize);
      ctx2d.strokeRect(px-cSize/2,py-cSize/2,cSize,cSize);
    }
  }

  // Features (stairs, elevators, ramp)
  fl.feat&&fl.feat.forEach(f=>{
    const [x1,y1]=w2c(f.x,f.z),[x2,y2]=w2c(f.x+f.w,f.z+f.d);
    const fw=x2-x1,fh=y2-y1;
    if(f.tp==='S'){
      // Stairs: diagonal hatch
      ctx2d.fillStyle='rgba(0,60,80,.5)';
      ctx2d.fillRect(x1,y1,fw,fh);
      ctx2d.strokeStyle='#005566';
      ctx2d.lineWidth=Math.max(.5,sc(.08));
      ctx2d.strokeRect(x1,y1,fw,fh);
      ctx2d.strokeStyle='rgba(0,150,180,.4)';
      ctx2d.lineWidth=Math.max(.4,sc(.05));
      const step=Math.max(3,sc(.6));
      for(let s=0;s<fw+fh;s+=step){
        ctx2d.beginPath();ctx2d.moveTo(x1+s,y1);ctx2d.lineTo(x1,y1+s);ctx2d.stroke();
      }
      if(zoom>.8){
        ctx2d.fillStyle='rgba(0,200,230,.8)';
        ctx2d.font=`bold ${Math.max(7,sc(.55))}px sans-serif`;
        ctx2d.textAlign='center';ctx2d.textBaseline='middle';
        ctx2d.fillText(f.n,x1+fw/2,y1+fh/2);
      }
    } else if(f.tp==='E'){
      ctx2d.fillStyle='rgba(0,100,50,.5)';ctx2d.fillRect(x1,y1,fw,fh);
      ctx2d.strokeStyle='#00aa66';ctx2d.lineWidth=Math.max(.5,sc(.1));ctx2d.strokeRect(x1,y1,fw,fh);
      // X symbol
      ctx2d.beginPath();ctx2d.moveTo(x1,y1);ctx2d.lineTo(x1+fw,y1+fh);
      ctx2d.moveTo(x1+fw,y1);ctx2d.lineTo(x1,y1+fh);ctx2d.stroke();
    } else if(f.tp==='R'){
      ctx2d.fillStyle='rgba(80,40,0,.4)';ctx2d.fillRect(x1,y1,fw,fh);
      ctx2d.strokeStyle='#886600';ctx2d.lineWidth=Math.max(.5,sc(.1));
      ctx2d.setLineDash([sc(1),sc(1)]);ctx2d.strokeRect(x1,y1,fw,fh);ctx2d.setLineDash([]);
      if(zoom>.8){
        ctx2d.fillStyle='rgba(255,200,0,.7)';
        ctx2d.font=`${Math.max(6,sc(.5))}px sans-serif`;
        ctx2d.textAlign='center';ctx2d.textBaseline='middle';
        ctx2d.fillText(f.n,x1+fw/2,y1+fh/2);
      }
    }
  });

  // Equipment dots
  const eqByFloor=allEquip.filter(eq=>eqFloor(eq)===fl.id);
  const eCols=Math.max(1,Math.ceil(Math.sqrt(eqByFloor.length)));
  eqByFloor.forEach((eq,i)=>{
    const wx=-40+(i%eCols)*13, wz=-28+Math.floor(i/eCols)*13;
    const [px,py]=w2c(wx,wz);
    const col=eqColorStr(eq);
    const r=Math.max(4,sc(.55));
    // glow
    const grd=ctx2d.createRadialGradient(px,py,0,px,py,r*2.5);
    grd.addColorStop(0,col.replace(')',',0.3)').replace('rgb','rgba'));
    grd.addColorStop(1,'transparent');
    ctx2d.beginPath();ctx2d.arc(px,py,r*2.5,0,Math.PI*2);
    ctx2d.fillStyle=grd;ctx2d.fill();
    // ring
    ctx2d.beginPath();ctx2d.arc(px,py,r*1.6,0,Math.PI*2);
    ctx2d.strokeStyle=col;ctx2d.lineWidth=Math.max(1,sc(.12));ctx2d.stroke();
    // dot
    ctx2d.beginPath();ctx2d.arc(px,py,r*.8,0,Math.PI*2);
    ctx2d.fillStyle=col;ctx2d.fill();
    eq._2d={x:px,y:py,r:r*2,wx,wz};
  });

  ctx2d.restore(); // end hull clip

  // Hull outline (drawn OVER clipped content)
  ctx2d.beginPath();
  hullCanv.forEach(([x,y],i)=>i?ctx2d.lineTo(x,y):ctx2d.moveTo(x,y));
  ctx2d.closePath();
  ctx2d.strokeStyle='#00d4ff';
  ctx2d.lineWidth=Math.max(1.5,sc(.22));
  ctx2d.shadowColor='#00d4ff';
  ctx2d.shadowBlur=sc(.8);
  ctx2d.stroke();
  ctx2d.shadowBlur=0;

  // Zone border lines (outside clip, but fine since they're inside the building)
  // Re-draw zone borders for visibility
  ctx2d.save();
  ctx2d.beginPath();
  hullCanv.forEach(([x,y],i)=>i?ctx2d.lineTo(x,y):ctx2d.moveTo(x,y));
  ctx2d.closePath();ctx2d.clip();
  fl.zones.forEach(z=>{
    const tp=ZT[z.t]||ZT.market;
    const [x1,y1]=w2c(z.x,z.z),[x2,y2]=w2c(z.x+z.w,z.z+z.d);
    ctx2d.strokeStyle=tp.b;
    ctx2d.lineWidth=Math.max(1,sc(.15));
    ctx2d.strokeRect(x1,y1,x2-x1,y2-y1);
  });
  ctx2d.restore();

  // Zone labels (drawn without clip so text not cut off)
  if(zoom>.4){
    const fs=Math.max(9,Math.min(18,sc(1.1)));
    fl.zones.forEach(z=>{
      const tp=ZT[z.t]||ZT.market;
      const cx=z.x+z.w/2, cz=z.z+z.d/2;
      const [px,py]=w2c(cx,cz);
      // Check if label is within canvas
      if(px<-50||px>canvas2d.width+50||py<-30||py>canvas2d.height+30) return;
      ctx2d.font=`bold ${fs}px 'Segoe UI','Noto Sans TC',sans-serif`;
      ctx2d.textAlign='center';ctx2d.textBaseline='middle';
      ctx2d.fillStyle='rgba(0,0,0,.55)';
      ctx2d.fillText(z.n,px+1,py+1);
      ctx2d.fillStyle=tp.t;
      ctx2d.fillText(z.n,px,py);
    });
  }

  // Sub-zone labels
  if(zoom>1.2){
    const fs2=Math.max(7,Math.min(13,sc(.75)));
    fl.sub&&fl.sub.forEach(z=>{
      const tp=ZT[z.t]||ZT.market;
      const cx=z.x+z.w/2, cz=z.z+z.d/2;
      const [px,py]=w2c(cx,cz);
      if(px<0||px>canvas2d.width||py<0||py>canvas2d.height) return;
      ctx2d.font=`${fs2}px 'Segoe UI',sans-serif`;
      ctx2d.textAlign='center';ctx2d.textBaseline='middle';
      ctx2d.fillStyle=tp.t+'aa';
      ctx2d.fillText(z.n,px,py);
    });
  }

  // Equipment labels
  if(zoom>1.8){
    const fs3=Math.max(7,Math.min(11,sc(.6)));
    allEquip.filter(eq=>eqFloor(eq)===fl.id).forEach(eq=>{
      if(!eq._2d) return;
      const [px,py]=[eq._2d.x,eq._2d.y];
      ctx2d.font=`${fs3}px 'Segoe UI',sans-serif`;
      ctx2d.textAlign='center';ctx2d.textBaseline='top';
      ctx2d.fillStyle='rgba(0,0,0,.6)';
      ctx2d.fillText(eq.name,px+1,py+eq._2d.r+4+1);
      ctx2d.fillStyle=eqColorStr(eq)+'cc';
      ctx2d.fillText(eq.name,px,py+eq._2d.r+4);
    });
  }

  // Legend
  drawLegend();
  // Scale bar
  drawScaleBar();
  // North arrow
  drawNorth();
}

function drawLegend(){
  const items=Object.entries(ZT).filter(([k])=>FLOORS[currentFI].zones.some(z=>z.t===k));
  const W=canvas2d.width;
  const x0=W-150, y0=canvas2d.height-10-items.length*16-8;
  ctx2d.fillStyle='rgba(4,20,40,.85)';
  ctx2d.strokeStyle='rgba(10,58,90,.8)';
  ctx2d.lineWidth=1;
  const boxH=items.length*16+10;
  ctx2d.fillRect(x0-4,y0-4,148,boxH);
  ctx2d.strokeRect(x0-4,y0-4,148,boxH);
  items.forEach(([k,v],i)=>{
    const y=y0+i*16;
    ctx2d.fillStyle=v.f;
    ctx2d.strokeStyle=v.b;
    ctx2d.lineWidth=.8;
    ctx2d.fillRect(x0,y,10,10);ctx2d.strokeRect(x0,y,10,10);
    ctx2d.font='10px sans-serif';ctx2d.textAlign='left';ctx2d.textBaseline='middle';
    ctx2d.fillStyle=v.t;
    ctx2d.fillText(v.zh||k,x0+14,y+5);
  });
}

function drawScaleBar(){
  // 10 world units = ? canvas pixels
  const unitPx=sc(10);
  const x0=20,y0=canvas2d.height-25;
  ctx2d.fillStyle='rgba(0,212,255,.7)';
  ctx2d.fillRect(x0,y0,unitPx,3);
  ctx2d.fillRect(x0,y0-4,2,11);
  ctx2d.fillRect(x0+unitPx,y0-4,2,11);
  ctx2d.font='10px monospace';ctx2d.textAlign='left';ctx2d.textBaseline='top';
  ctx2d.fillStyle='rgba(0,212,255,.7)';
  ctx2d.fillText('10 m',x0,y0+5);
}

function drawNorth(){
  const x0=canvas2d.width-30,y0=canvas2d.height-80;
  const r=14;
  ctx2d.beginPath();ctx2d.arc(x0,y0,r+2,0,Math.PI*2);
  ctx2d.fillStyle='rgba(4,20,40,.7)';ctx2d.fill();
  ctx2d.strokeStyle='rgba(0,212,255,.4)';ctx2d.lineWidth=1;ctx2d.stroke();
  // Arrow (pointing up = north)
  ctx2d.beginPath();
  ctx2d.moveTo(x0,y0-r);ctx2d.lineTo(x0+5,y0+5);ctx2d.lineTo(x0,y0+2);ctx2d.lineTo(x0-5,y0+5);
  ctx2d.closePath();
  ctx2d.fillStyle='#00d4ff';ctx2d.fill();
  ctx2d.font='bold 9px sans-serif';ctx2d.textAlign='center';ctx2d.textBaseline='top';
  ctx2d.fillStyle='rgba(0,212,255,.8)';
  ctx2d.fillText('N',x0,y0+r+2);
}

function handle2DClick(cx,cy){
  const fl=FLOORS[currentFI];
  const eqByFloor=allEquip.filter(eq=>eqFloor(eq)===fl.id);
  for(const eq of eqByFloor){
    if(!eq._2d) continue;
    const dx=cx-eq._2d.x, dy=cy-eq._2d.y;
    if(Math.sqrt(dx*dx+dy*dy)<eq._2d.r+4){
      showInfo(eq); return;
    }
  }
  closeInfo();
}

// ─── VIEW MANAGEMENT ─────────────────────────────────────────────────────────
function enter2DMode(fi){
  viewMode='2d'; currentFI=fi;
  document.getElementById('c3d').style.display='none';
  document.getElementById('c2d').style.display='block';
  document.getElementById('c2d-bar').classList.add('show');
  document.getElementById('c2d-label').classList.add('show');
  document.getElementById('c2d-label').textContent=FLOORS[fi].label+' 平面圖';
  document.getElementById('c2d-zoom').classList.add('show');
  document.getElementById('c2d-zoom').textContent='縮放 '+(zoom*100|0)+'%';
  document.getElementById('btn3d').style.display='';
  document.getElementById('tb-mode').textContent=FLOORS[fi].label+' 平面圖';
  document.getElementById('hint').textContent='拖曳 平移  |  滾輪 縮放  |  點擊設備 查看詳情';
  cancelAnimationFrame(animId);
  draw2D();
}

function switchTo3D(){
  viewMode='3d';
  document.getElementById('c3d').style.display='';
  document.getElementById('c2d').style.display='none';
  document.getElementById('c2d-bar').classList.remove('show');
  document.getElementById('c2d-label').classList.remove('show');
  document.getElementById('c2d-zoom').classList.remove('show');
  document.getElementById('btn3d').style.display='none';
  document.getElementById('tb-mode').textContent='3D 建物巡檢地圖';
  document.getElementById('hint').textContent='拖曳 旋轉  |  滾輪 縮放  |  右鍵 平移';
  animate3D();
}

function floorClick(fi){
  document.querySelectorAll('.fn-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.fi)===fi));
  currentFI=fi;
  if(viewMode==='3d'){
    // Animate camera to floor level
    const fl=FLOORS[fi];
    const targetY=fl.elev+2;
    let startY=orb.ty,t=0;
    const anim=()=>{t+=.05;orb.ty=startY+(targetY-startY)*Math.min(t,1);if(t<1)requestAnimationFrame(anim);};
    anim();
    // Enter 2D for this floor after brief delay
    setTimeout(()=>enter2DMode(fi),300);
  } else {
    enter2DMode(fi);
  }
}

// ─── SUPABASE ────────────────────────────────────────────────────────────────
async function loadData(){
  prog(65,'載入設備…');
  const {data:eqs}=await db.from('equipment').select('*').eq('status','active');
  if(!eqs?.length){addEq3D();updateStats([]);return;}

  prog(80,'載入巡檢狀態…');
  const ids=eqs.map(e=>e.equipment_id);
  const {data:recs}=await db.from('inspection_records').select('equipment_id,light_status,inspect_time').in('equipment_id',ids).order('inspect_time',{ascending:false});

  const latest={};
  recs?.forEach(r=>{if(!latest[r.equipment_id])latest[r.equipment_id]=r;});

  allEquip=eqs.map(eq=>({...eq,_light:latest[eq.equipment_id]?.light_status||null,_last:latest[eq.equipment_id]?.inspect_time||null}));
  addEq3D();
  updateStats(allEquip);
}

function updateStats(eqs){
  let g=0,r=0,y=0;
  eqs.forEach(eq=>{const s=eqStat(eq);if(s==='green')g++;else if(s==='red')r++;else y++;});
  document.getElementById('s-gr').textContent=g;
  document.getElementById('s-rd').textContent=r;
  document.getElementById('s-yw').textContent=y;
  document.getElementById('s-tot').textContent=eqs.length;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function eqFloor(eq){
  const l=(eq.location||'').toLowerCase();
  if(l.includes('b1')||l.includes('地下'))return'B1';
  if(l.includes('4f')||l.includes('四樓')||l.includes('4樓'))return'4F';
  if(l.includes('3f')||l.includes('三樓')||l.includes('3樓'))return'3F';
  if(l.includes('2f')||l.includes('二樓')||l.includes('2樓'))return'2F';
  return'1F';
}
function eqStat(eq){return eq._light==='red'?'red':eq._light==='green'?'green':'yellow';}
function eqColor(eq){const s=eqStat(eq);return s==='green'?new THREE.Color(0x00ff88):s==='red'?new THREE.Color(0xff3366):new THREE.Color(0xffd700);}
function eqColorStr(eq){const s=eqStat(eq);return s==='green'?'#00ff88':s==='red'?'#ff3366':'#ffd700';}

function showInfo(eq){
  selectedEq=eq;
  document.getElementById('ip-name').textContent=eq.name;
  document.getElementById('ip-loc').textContent=eq.location||'—';
  document.getElementById('ip-qr').textContent=eq.qr_code||'—';
  document.getElementById('ip-time').textContent=eq._last?new Date(eq._last).toLocaleString('zh-TW'):'未巡檢';
  const s=eqStat(eq);
  const cls={green:'ip-green',red:'ip-red',yellow:'ip-yellow'};
  const lbl={green:'正常',red:'異常',yellow:'待巡檢'};
  document.getElementById('ip-sw').innerHTML=`<div class="ip-status ${cls[s]}">${lbl[s]}</div>`;
  document.getElementById('infopanel').classList.add('show');
}
function closeInfo(){document.getElementById('infopanel').classList.remove('show');selectedEq=null;}
function gotoInspect(){if(selectedEq)window.location.href=`app.html?eq=${encodeURIComponent(selectedEq.equipment_id)}`;}

function toggleFullscreen(){
  if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(()=>{});document.querySelector('#topbar .tb-btn').textContent='⛶ 退出全螢幕';}
  else{document.exitFullscreen();document.querySelector('#topbar .tb-btn').textContent='⛶ 全螢幕';}
}

// ─── MAIN ─────────────────────────────────────────────────────────────────────
async function main(){
  prog(10,'初始化 3D…');
  init3D();
  prog(25,'建立建物模型…');
  build3D();
  prog(45,'設置控制…');
  setupOrbit();
  initCanvas2D();
  prog(60,'載入設備資料…');
  await loadData();
  prog(100,'完成');
  setTimeout(()=>{
    const ld=document.getElementById('loading');
    ld.style.transition='opacity .5s';ld.style.opacity='0';
    setTimeout(()=>ld.style.display='none',500);
  },150);
  animate3D();
}

main().catch(e=>{document.getElementById('ldmsg').textContent='錯誤：'+e.message;console.error(e);});
</script>
