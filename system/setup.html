<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系統初始化</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:40px 36px;width:100%;max-width:480px}
h1{font-size:1.3rem;font-weight:700;color:#f8fafc;margin-bottom:6px}
.sub{font-size:.83rem;color:#64748b;margin-bottom:28px}
.step{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid #1e293b}
.step:last-child{border-bottom:none}
.step-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;margin-top:1px}
.pending{background:#334155;color:#64748b}
.running{background:#1e3a5f;color:#60a5fa;animation:pulse 1s infinite}
.ok{background:#052e16;color:#22c55e}
.fail{background:#450a0a;color:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.step-text{font-size:.87rem}
.step-label{color:#e2e8f0;font-weight:500}
.step-detail{font-size:.75rem;color:#64748b;margin-top:3px}
.result{margin-top:24px;padding:16px;border-radius:12px;font-size:.88rem;display:none}
.result.ok{background:#052e16;border:1px solid #16a34a;color:#86efac;display:block}
.result.fail{background:#450a0a;border:1px solid #7f1d1d;color:#fca5a5;display:block}
.btn{display:inline-block;margin-top:16px;padding:11px 24px;background:#6366f1;color:#fff;border:none;border-radius:9px;font-size:.9rem;font-weight:600;cursor:pointer;text-decoration:none}
.btn:hover{background:#4f46e5}
</style>
</head>
<body>
<div class="card">
  <h1>🔧 系統初始化</h1>
  <div class="sub">自動建立管理者帳號，請稍候…</div>

  <div id="steps">
    <div class="step" id="s1">
      <div class="step-icon pending" id="i1">1</div>
      <div class="step-text">
        <div class="step-label">連線 Supabase</div>
        <div class="step-detail" id="d1">等待中…</div>
      </div>
    </div>
    <div class="step" id="s2">
      <div class="step-icon pending" id="i2">2</div>
      <div class="step-text">
        <div class="step-label">確認資料表存在</div>
        <div class="step-detail" id="d2">等待中…</div>
      </div>
    </div>
    <div class="step" id="s3">
      <div class="step-icon pending" id="i3">3</div>
      <div class="step-text">
        <div class="step-label">建立管理者帳號</div>
        <div class="step-detail" id="d3">等待中…</div>
      </div>
    </div>
    <div class="step" id="s4">
      <div class="step-icon pending" id="i4">4</div>
      <div class="step-text">
        <div class="step-label">建立初始巡檢週期</div>
        <div class="step-detail" id="d4">等待中…</div>
      </div>
    </div>
  </div>

  <div class="result" id="resultBox"></div>
</div>

<script>
const SUPABASE_URL = 'https://qztffronusdhgxhjjubt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6dGZmcm9udXNkaGd4aGpqdWJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTI1MzgsImV4cCI6MjA5NzI2ODUzOH0.FnUxot5YXI3yKCUCmJA5P4ysEJhmtaQQA6rM7MRy3oA';
const ADMIN_AUTH_ID = 'eb771a87-aa4d-4066-b23d-9b810a5c00bd';

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function setStep(n, state, detail) {
  const icon = document.getElementById('i' + n);
  const det  = document.getElementById('d' + n);
  icon.className = 'step-icon ' + state;
  icon.textContent = state === 'ok' ? '✓' : state === 'fail' ? '✗' : state === 'running' ? '…' : n;
  if (detail) det.textContent = detail;
}

function showResult(ok, msg, link) {
  const box = document.getElementById('resultBox');
  box.className = 'result ' + (ok ? 'ok' : 'fail');
  box.innerHTML = msg + (link ? `<br><a class="btn" href="${link}">前往登入 →</a>` : '');
}

async function run() {
  // Step 1: Connect
  setStep(1, 'running', '連線中…');
  try {
    const { error } = await db.from('users').select('user_id', { count: 'exact', head: true });
    if (error && error.code === '42P01') {
      setStep(1, 'fail', '連線成功');
      setStep(2, 'fail', '資料表不存在，請先在 SQL Editor 執行 schema.sql');
      showResult(false, '❌ 請先在 Supabase SQL Editor 執行 system/sql/schema.sql，再重新開啟此頁面。');
      return;
    }
    setStep(1, 'ok', '連線成功');
  } catch(e) {
    setStep(1, 'fail', '連線失敗：' + e.message);
    showResult(false, '❌ 無法連線 Supabase，請確認網路連線。');
    return;
  }

  // Step 2: Check table
  setStep(2, 'running', '確認中…');
  const { data: existing } = await db.from('users').select('user_id').eq('auth_id', ADMIN_AUTH_ID);
  if (existing && existing.length > 0) {
    setStep(2, 'ok', '管理者帳號已存在');
    setStep(3, 'ok', '跳過（已存在）');
    setStep(4, 'ok', '跳過');
    showResult(true, '✓ 系統已初始化完成，管理者帳號存在。', 'login.html');
    return;
  }
  setStep(2, 'ok', '資料表正常');

  // Step 3: Insert admin user
  setStep(3, 'running', '建立中…');
  const { error: insErr } = await db.from('users').insert({
    auth_id: ADMIN_AUTH_ID,
    name: '系統管理者',
    phone: '',
    department: '資訊部',
    role: 'admin',
    status: 'active',
  });
  if (insErr) {
    setStep(3, 'fail', '失敗：' + insErr.message);
    showResult(false, '❌ 建立管理者失敗：' + insErr.message + '<br>請確認 schema.sql 已執行，且 RLS policy 已開啟。');
    return;
  }
  setStep(3, 'ok', '管理者帳號建立成功');

  // Step 4: Ensure cycle exists
  setStep(4, 'running', '建立中…');
  const { data: cycles } = await db.from('inspection_cycles').select('cycle_id').is('ended_at', null).limit(1);
  if (!cycles || cycles.length === 0) {
    await db.from('inspection_cycles').insert({ cycle_type: 'daily', started_at: new Date().toISOString() });
  }
  setStep(4, 'ok', '巡檢週期就緒');

  showResult(true,
    '✓ 初始化完成！管理者帳號已建立，現在可以登入後台。',
    'login.html'
  );
}

run();
</script>
</body>
</html>
