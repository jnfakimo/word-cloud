<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>臺北農產運銷股份有限公司 第一果菜市場 巡檢系統</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET ===== */
*{box-sizing:border-box;margin:0;padding:0}

/* ===== VARS ===== */
:root{
  --bg:#020b18;
  --surface:#04111f;
  --panel:#05101e;
  --border:#0c2840;
  --border-hi:#1a4a70;
  --cyan:#00d4ff;
  --cyan-glow:0 0 14px rgba(0,212,255,0.5);
  --blue:#1a7fff;
  --green:#00ff9d;
  --amber:#ffb300;
  --red:#ff3b3b;
  --text:#a8d8f0;
  --text-hi:#d4eeff;
  --text-dim:#3a6a8a;
  --font-mono:'Share Tech Mono',monospace;
  --font-head:'Rajdhani',sans-serif;
}

body{
  font-family:'Noto Sans TC',system-ui,sans-serif;
  background:var(--bg);
  background-image:
    linear-gradient(rgba(0,212,255,0.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,0.02) 1px,transparent 1px);
  background-size:40px 40px;
  color:var(--text);
  min-height:100vh;
  padding-bottom:70px;
}

/* ===== OFFLINE BANNER ===== */
.offline-banner{
  background:rgba(255,107,0,0.15);
  color:var(--amber);
  border-bottom:1px solid rgba(255,107,0,0.3);
  padding:8px 16px;font-size:0.75rem;
  text-align:center;display:none;
  font-family:var(--font-mono);letter-spacing:0.04em;
}
.offline-banner.show{display:block}

/* ===== NAVBAR ===== */
.navbar{
  background:rgba(3,10,22,0.97);
  border-bottom:1px solid var(--border);
  padding:10px 16px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;min-height:64px;
}
.navbar::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--cyan),var(--blue) 40%,transparent);
  opacity:0.5;
}
.nav-brand{display:flex;flex-direction:column;gap:2px}
.nav-org{font-family:'Noto Sans TC',system-ui,sans-serif;font-size:1.16rem;font-weight:700;color:var(--text-hi);letter-spacing:0.02em}
.nav-title{
  font-family:var(--font-head);font-size:1rem;font-weight:700;
  color:var(--cyan);letter-spacing:0.06em;text-transform:uppercase;
  text-shadow:var(--cyan-glow);
}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-user{font-size:0.68rem;color:var(--text-dim);font-family:var(--font-mono)}
.logout-btn{
  font-size:0.68rem;color:var(--text-dim);
  background:none;border:1px solid var(--border);
  padding:5px 10px;border-radius:2px;cursor:pointer;
  transition:all 0.2s;font-family:var(--font-head);
  text-transform:uppercase;letter-spacing:0.06em;
}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

/* ===== BOTTOM TABS ===== */
.tabs{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;
  background:rgba(3,10,22,0.97);
  border-top:1px solid var(--border);
  z-index:50;
}
.tabs::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan) 50%,transparent);
  opacity:0.4;
}
.tab{
  flex:1;padding:12px 8px 10px;
  text-align:center;font-size:0.68rem;
  color:var(--text-dim);cursor:pointer;
  border-top:2px solid transparent;
  transition:all 0.2s;
  font-family:var(--font-head);letter-spacing:0.06em;text-transform:uppercase;
  font-weight:600;
}
.tab:hover{color:var(--text);background:rgba(0,212,255,0.03)}
.tab.active{
  color:var(--cyan);
  border-top-color:var(--cyan);
  background:rgba(0,212,255,0.06);
  text-shadow:0 0 10px rgba(0,212,255,0.4);
}
.tab-icon{font-size:1.1rem;display:block;margin-bottom:2px}

/* ===== PAGES ===== */
.page{display:none;padding:14px}
.page.active{display:block}

/* ===== SECTION HEADER ===== */
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;padding-bottom:10px;
  border-bottom:1px solid var(--border);
  position:relative;
}
.section-header::after{
  content:'';position:absolute;bottom:-1px;left:0;
  width:60px;height:1px;
  background:var(--cyan);opacity:0.7;
}
.section-title{
  font-family:var(--font-head);font-size:0.95rem;font-weight:700;
  color:var(--cyan);letter-spacing:0.06em;text-transform:uppercase;
}
.badge-count{
  font-size:0.68rem;
  background:rgba(12,40,64,0.6);
  border:1px solid var(--border-hi);
  padding:3px 10px;border-radius:2px;
  color:var(--text-dim);
  font-family:var(--font-mono);letter-spacing:0.04em;
}
.sync-badge{
  font-size:0.68rem;
  background:rgba(255,179,0,0.1);
  color:var(--amber);
  border:1px solid rgba(255,179,0,0.3);
  padding:4px 10px;border-radius:2px;
  cursor:pointer;font-family:var(--font-mono);
  animation:pulse-amber 2s infinite;
}
@keyframes pulse-amber{
  0%,100%{box-shadow:none}
  50%{box-shadow:0 0 10px rgba(255,179,0,0.3)}
}

/* ===== EQUIPMENT LIST ===== */
.eq-list{display:flex;flex-direction:column;gap:8px;margin-top:4px}

.eq-card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:2px;padding:14px 16px;
  display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:all 0.2s;
  position:relative;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%);
}
.eq-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--border-hi),transparent 60%);
  opacity:0.5;transition:opacity 0.2s;
}
.eq-card:hover{border-color:var(--border-hi)}
.eq-card:hover::before{opacity:1;background:linear-gradient(90deg,var(--cyan),transparent 60%)}

/* STATUS LIGHT */
.light{
  width:12px;height:12px;border-radius:50%;flex-shrink:0;
  position:relative;
}
.light::after{
  content:'';
  position:absolute;inset:-3px;border-radius:50%;
  opacity:0.3;
}
.light.red{
  background:var(--red);
  box-shadow:0 0 10px var(--red),0 0 4px var(--red);
  animation:pulse-red 1.8s ease-in-out infinite;
}
.light.red::after{background:var(--red);animation:pulse-ring-red 1.8s ease-in-out infinite}
.light.green{
  background:var(--green);
  box-shadow:0 0 10px var(--green),0 0 4px var(--green);
}
.light.amber{
  background:var(--amber);
  box-shadow:0 0 10px var(--amber),0 0 4px var(--amber);
  animation:pulse-amber-light 1.8s ease-in-out infinite;
}
.light.amber::after{background:var(--amber);animation:pulse-ring-red 1.8s ease-in-out infinite}
@keyframes pulse-amber-light{
  0%,100%{box-shadow:0 0 6px var(--amber),0 0 2px var(--amber);opacity:0.8}
  50%{box-shadow:0 0 16px var(--amber),0 0 6px var(--amber);opacity:1}
}
@keyframes pulse-red{
  0%,100%{box-shadow:0 0 6px var(--red),0 0 2px var(--red);opacity:0.8}
  50%{box-shadow:0 0 16px var(--red),0 0 6px var(--red);opacity:1}
}
@keyframes pulse-ring-red{
  0%,100%{opacity:0.2;transform:scale(1)}
  50%{opacity:0.5;transform:scale(1.5)}
}

.eq-info{flex:1;min-width:0}
.eq-name{
  font-size:0.92rem;font-weight:700;
  color:var(--text-hi);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-family:var(--font-head);letter-spacing:0.02em;
}
.eq-loc{font-size:0.7rem;color:var(--text-dim);margin-top:2px;font-family:var(--font-mono)}
.eq-time{
  font-size:0.68rem;color:var(--green);margin-top:4px;
  font-family:var(--font-mono);letter-spacing:0.04em;
  text-shadow:0 0 8px rgba(0,255,157,0.4);
}
.eq-badge{
  font-size:0.65rem;padding:3px 8px;border-radius:2px;
  font-weight:700;flex-shrink:0;
  font-family:var(--font-mono);letter-spacing:0.05em;
}
.badge-done{
  background:rgba(0,255,157,0.08);color:var(--green);
  border:1px solid rgba(0,255,157,0.3);
}
.badge-todo{
  background:rgba(255,179,0,0.08);color:var(--amber);
  border:1px solid rgba(255,179,0,0.3);
}
.badge-abnormal{
  background:rgba(255,59,59,0.08);color:var(--red);
  border:1px solid rgba(255,59,59,0.25);
}

/* ===== QR SECTION ===== */
#qr-section{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:2px;padding:16px;margin-bottom:14px;
  position:relative;
}
#qr-section::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--cyan),var(--blue) 50%,transparent);
  opacity:0.5;
}
#qr-reader{
  width:100%;border-radius:2px;overflow:hidden;
  border:1px solid var(--border-hi);
  position:relative;
}

/* HUD corners on QR reader */
.qr-hud{position:relative}
.qr-hud::before,.qr-hud::after{
  content:'';position:absolute;
  width:20px;height:20px;z-index:10;pointer-events:none;
}
.qr-hud::before{top:0;left:0;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan)}
.qr-hud::after{bottom:0;right:0;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan)}

.scan-hint{
  font-size:0.75rem;color:var(--text-dim);text-align:center;
  margin-top:10px;font-family:var(--font-mono);letter-spacing:0.05em;
}

/* ===== FORM CARD ===== */
.form-card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:2px;padding:18px;
  position:relative;
}
.form-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--cyan),var(--blue) 50%,transparent);
  opacity:0.4;
}
.form-title{
  font-family:var(--font-head);font-size:0.95rem;font-weight:700;
  color:var(--cyan);margin-bottom:16px;
  letter-spacing:0.06em;text-transform:uppercase;
  display:flex;align-items:center;gap:6px;
}
.form-title::before{content:'◈';font-size:0.5rem;opacity:0.8}

/* ===== FIELDS ===== */
.field{margin-bottom:14px}
.field label{
  display:block;font-size:0.67rem;color:var(--text-dim);
  margin-bottom:6px;font-weight:600;
  letter-spacing:0.08em;text-transform:uppercase;
  font-family:var(--font-head);
}
.field input,.field textarea,.field select{
  width:100%;padding:10px 13px;
  background:rgba(2,8,20,0.8);
  border:1px solid var(--border);border-radius:2px;
  color:var(--text-hi);font-size:0.9rem;
  outline:none;transition:all 0.2s;font-family:inherit;
}
.field input:focus,.field textarea:focus,.field select:focus{
  border-color:var(--cyan);
  box-shadow:0 0 0 1px rgba(0,212,255,0.2),0 0 14px rgba(0,212,255,0.08);
}
.field textarea{resize:vertical;min-height:80px}

/* ===== RADIO BUTTONS ===== */
.radio-group{display:flex;gap:10px}
.radio-btn{
  flex:1;padding:10px;
  border:1px solid var(--border);border-radius:2px;
  text-align:center;cursor:pointer;
  font-size:0.86rem;font-weight:700;
  transition:all 0.2s;color:var(--text-dim);
  font-family:var(--font-head);letter-spacing:0.04em;text-transform:uppercase;
}
.radio-btn:hover{border-color:var(--border-hi);color:var(--text)}
.radio-btn.selected-normal{
  border-color:var(--green);background:rgba(0,255,157,0.08);color:var(--green);
  text-shadow:0 0 8px rgba(0,255,157,0.4);
  box-shadow:0 0 10px rgba(0,255,157,0.1) inset;
}
.radio-btn.selected-abnormal{
  border-color:var(--red);background:rgba(255,59,59,0.08);color:var(--red);
  text-shadow:0 0 8px rgba(255,59,59,0.4);
  box-shadow:0 0 10px rgba(255,59,59,0.1) inset;
}

/* ===== BUTTONS ===== */
.btn-primary{
  width:100%;padding:13px;
  background:linear-gradient(135deg,#093060,#0055a8);
  color:var(--cyan);border:1px solid var(--cyan);
  border-radius:2px;font-size:0.9rem;font-weight:700;
  cursor:pointer;margin-top:12px;transition:all 0.2s;
  font-family:var(--font-head);text-transform:uppercase;letter-spacing:0.08em;
  text-shadow:0 0 8px rgba(0,212,255,0.5);
}
.btn-primary:hover{
  background:linear-gradient(135deg,#0d4080,#006fcf);
  box-shadow:var(--cyan-glow);
}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed}

.btn-scan{
  width:100%;padding:13px;
  background:linear-gradient(135deg,#082840,#004070);
  color:#60c8ff;border:1px solid rgba(26,127,255,0.5);
  border-radius:2px;font-size:0.9rem;font-weight:700;
  cursor:pointer;margin-bottom:12px;transition:all 0.2s;
  font-family:var(--font-head);text-transform:uppercase;letter-spacing:0.08em;
}
.btn-scan:hover{box-shadow:0 0 14px rgba(26,127,255,0.3)}

.btn-secondary{
  padding:10px 20px;
  background:rgba(12,40,64,0.4);color:var(--text-dim);
  border:1px solid var(--border);border-radius:2px;
  font-size:0.85rem;cursor:pointer;transition:all 0.2s;
  font-family:var(--font-head);text-transform:uppercase;letter-spacing:0.06em;
}
.btn-secondary:hover{border-color:var(--cyan);color:var(--text)}

/* ===== MODAL ===== */
.modal-bg{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(6px);
  z-index:100;display:none;align-items:flex-end;
}
.modal-bg.show{display:flex}
.modal{
  background:var(--surface);
  border:1px solid var(--border-hi);
  border-radius:4px 4px 0 0;
  padding:24px 20px 30px;
  width:100%;max-height:90vh;overflow-y:auto;
  position:relative;
}
.modal::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--cyan),var(--blue));
}
.modal-handle{
  width:40px;height:3px;
  background:var(--border-hi);border-radius:2px;
  margin:0 auto 20px;
}

/* ===== TOAST ===== */
.toast{
  position:fixed;bottom:80px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:rgba(0,255,157,0.1);color:var(--green);
  border:1px solid rgba(0,255,157,0.35);
  padding:10px 24px;border-radius:2px;
  font-weight:700;opacity:0;transition:all 0.3s;
  pointer-events:none;z-index:200;font-size:0.85rem;
  font-family:var(--font-mono);letter-spacing:0.05em;
  text-shadow:0 0 8px rgba(0,255,157,0.5);
  box-shadow:0 0 20px rgba(0,255,157,0.15);
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%)}
.toast.err{
  background:rgba(255,59,59,0.1);color:var(--red);
  border-color:rgba(255,59,59,0.35);
  text-shadow:0 0 8px rgba(255,59,59,0.5);
  box-shadow:0 0 20px rgba(255,59,59,0.15);
}
</style>
</head>
<body>
<div class="offline-banner" id="offlineBanner">⚡ 目前離線，資料將暫存於裝置</div>

<nav class="navbar">
  <div class="nav-brand">
    <div class="nav-org">臺北農產運銷股份有限公司 第一果菜市場</div>
    <span class="nav-title">⬡ 巡檢系統</span>
  </div>
  <div class="nav-right">
    <span class="nav-user" id="navUser"></span>
    <button class="logout-btn" onclick="logout()">⏻</button>
  </div>
</nav>

<!-- PAGE: INSPECT LIST -->
<div class="page active" id="page-inspect">
  <div class="section-header" style="margin-top:4px">
    <span class="section-title">◈ 設備清單</span>
    <span class="badge-count" id="pendingCount">LOADING…</span>
  </div>
  <!-- 進度條 -->
  <div style="margin-bottom:12px;background:var(--panel);border:1px solid var(--border);border-radius:2px;padding:10px 14px;position:relative">
    <div style="position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--cyan),transparent);opacity:.4"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="font-family:var(--font-mono);font-size:.68rem;color:var(--text-dim);letter-spacing:.06em">巡檢進度</span>
      <span style="font-family:var(--font-mono);font-size:.72rem;color:var(--cyan)" id="progressText">0 / 0</span>
    </div>
    <div style="height:4px;background:rgba(12,40,64,.8);border-radius:2px;overflow:hidden">
      <div id="progressBar" style="height:100%;width:0%;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:2px;transition:width .5s ease;box-shadow:0 0 8px var(--cyan)"></div>
    </div>
  </div>
  <!-- 搜尋 -->
  <div style="margin-bottom:10px">
    <input id="eqSearch" type="text" placeholder="搜尋設備名稱或位置…" oninput="filterEqList()" style="width:100%;padding:9px 14px;background:rgba(2,8,20,.8);border:1px solid var(--border);border-radius:2px;color:var(--text-hi);font-size:.88rem;outline:none;transition:border-color .2s" onfocus="this.style.borderColor='var(--cyan)'" onblur="this.style.borderColor='var(--border)'">
  </div>
  <div id="offlineSyncBar" style="display:none;margin-bottom:12px">
    <span class="sync-badge" onclick="syncOfflineData()">⚠ 有 <span id="offlineCount">0</span> 筆離線資料，點此同步</span>
  </div>
  <div class="eq-list" id="eqList">
    <div style="text-align:center;color:var(--text-dim);padding:40px 0;font-family:var(--font-mono);font-size:.82rem">LOADING…</div>
  </div>
</div>

<!-- PAGE: SCAN -->
<div class="page" id="page-scan">
  <div id="qr-section">
    <div class="qr-hud">
      <div id="qr-reader"></div>
    </div>
    <div class="scan-hint">▶ 將 QR Code 對準框內，自動識別</div>
  </div>
  <div class="form-card" id="scan-result-form" style="display:none">
    <div class="form-title" id="scan-eq-title">設備名稱</div>
    <div class="field">
      <label>運轉狀態</label>
      <div class="radio-group">
        <div class="radio-btn" id="btn-normal" onclick="selectStatus('normal')">✓ 正常</div>
        <div class="radio-btn" id="btn-abnormal" onclick="selectStatus('abnormal')">✗ 異常</div>
      </div>
    </div>
    <div class="field" id="note-field" style="display:none">
      <label>異常說明</label>
      <textarea id="abnormalNote" placeholder="請描述異常情形…"></textarea>
    </div>
    <div class="field" id="photo-field" style="display:none">
      <label style="display:flex;align-items:center;gap:6px">
        📷 異常照片 <span style="color:var(--red);font-size:.72rem">（必填）</span>
      </label>
      <label style="display:block;cursor:pointer">
        <div id="photoPreview" style="width:100%;min-height:100px;border:1px dashed var(--border-hi);border-radius:2px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:.78rem;font-family:var(--font-mono);letter-spacing:.06em;overflow:hidden;background:rgba(2,8,20,.6)">
          點此拍照或選擇圖片
        </div>
        <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" onchange="previewPhoto('photoInput','photoPreview')">
      </label>
    </div>
    <button class="btn-primary" id="saveInspectBtn" onclick="saveInspection()">儲存巡檢記錄</button>
    <div style="margin-top:8px">
      <button class="btn-secondary" style="width:100%" onclick="cancelScan()">取消</button>
    </div>
  </div>
  <div id="scan-prompt" style="text-align:center;color:var(--text-dim);padding:24px;font-size:.82rem;font-family:var(--font-mono);letter-spacing:.06em">
    掃描設備上的 QR Code 以開始巡檢
  </div>
</div>

<!-- PAGE: REPAIR -->
<div class="page" id="page-repair">
  <div class="section-header" style="margin-top:4px">
    <span class="section-title">◪ 報修單</span>
  </div>

        <option value="direct">員工直接通報</option>
        <option value="inspection">巡檢異常觸發</option>

    <div class="field">
      <label>設備</label>
      <select id="repairEqId"></select>
    </div>

      <label>報修人</label>
      <input id="repairReporter" type="text" placeholder="姓名">
    </div>
    <div class="field">
      <label>聯絡電話</label>
      <input id="repairPhone" type="tel" placeholder="0912-345-678">
    </div>
    <div class="field">
      <label>部門</label>
      <input id="repairDept" type="text" placeholder="部門名稱">
    </div>
    <div class="field">
      <label>故障說明</label>
      <textarea id="repairFault" placeholder="請描述故障情形…"></textarea>

<div class="toast" id="toast"></div>

<!-- BOTTOM TABS -->
<div class="tabs">
  <div class="tab active" data-tab="inspect">

  </div>

    <span class="tab-icon">◉</span>掃描
  </div>

<!-- INSPECTION CONFIRM MODAL -->
<div class="modal-bg" id="inspectModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="form-title" id="modal-eq-name">確認設備</div>
    <div style="font-size:.75rem;color:var(--text-dim);margin-bottom:16px;font-family:var(--font-mono)" id="modal-eq-loc"></div>
    <div class="field">
      <label>運轉狀態</label>
      <div class="radio-group">
        <div class="radio-btn" id="modal-btn-normal" onclick="selectModalStatus('normal')">✓ 正常</div>
        <div class="radio-btn" id="modal-btn-abnormal" onclick="selectModalStatus('abnormal')">✗ 異常</div>
      </div>
    </div>
    <div class="field" id="modal-note-field" style="display:none">
      <label>異常說明</label>
      <textarea id="modalAbnormalNote" placeholder="請描述異常情形…"></textarea>
    </div>
    <div class="field" id="modal-photo-field" style="display:none">
      <label style="display:flex;align-items:center;gap:6px">
        📷 異常照片 <span style="color:var(--red);font-size:.72rem">（必填）</span>

      <label style="display:block;cursor:pointer">
        <div id="modalPhotoPreview" style="width:100%;min-height:100px;border:1px dashed var(--border-hi);border-radius:2px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:.78rem;font-family:var(--font-mono);letter-spacing:.06em;overflow:hidden;background:rgba(2,8,20,.6)">
          點此拍照或選擇圖片
        </div>
        <input type="file" id="modalPhotoInput" accept="image/*" capture="environment" style="display:none" onchange="previewPhoto('modalPhotoInput','modalPhotoPreview')">
      </label>
    </div>
    <button class="btn-primary" onclick="saveModalInspection()">儲存</button>
    <div style="margin-top:8px">
      <button class="btn-secondary" style="width:100%" onclick="closeModal()">取消</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://qztffronusdhgxhjjubt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6dGZmcm9udXNkaGd4aGpqdWJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTI1MzgsImV4cCI6MjA5NzI2ODUzOH0.FnUxot5YXI3yKCUCmJA5P4ysEJhmtaQQA6rM7MRy3oA';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let currentCycle = null;
let equipmentMap = {};
let scanStatus = null;
let scannedEquipment = null;
let modalEquipment = null;
let modalStatus = null;
let htmlQrCode = null;
let isScannerActive = false;

const OFFLINE_KEY = 'insp_offline_queue';
function getOfflineQueue() { try { return JSON.parse(localStorage.getItem(OFFLINE_KEY) || '[]'); } catch { return []; } }
function saveOfflineQueue(q) { localStorage.setItem(OFFLINE_KEY, JSON.stringify(q)); }

(async () => {
  const showInitErr = msg => {
    document.getElementById('eqList').innerHTML =
      `<div style="text-align:center;color:var(--red);padding:40px 16px;font-family:var(--font-mono);font-size:.8rem;line-height:1.8">
        ⚠ 系統初始化失敗<br><span style="color:var(--text-dim);font-size:.72rem">${msg}</span><br><br>
        <button onclick="location.reload()" style="margin-top:8px;padding:8px 20px;background:transparent;border:1px solid var(--cyan);color:var(--cyan);font-family:var(--font-mono);cursor:pointer;font-size:.72rem">重新載入</button>
      </div>`;
    document.getElementById('pendingCount').textContent = 'ERROR';
  };
  const setStatus = txt => { document.getElementById('pendingCount').textContent = txt; };

  try {
    setStatus('連線中…');
    const { data: profile, error: pErr } = await db.from('users').select('*').eq('name', '系統管理者').single();
    if (pErr && pErr.code !== 'PGRST116') throw new Error('users 查詢失敗: ' + pErr.message);
    currentUser = profile || { user_id: 'eb771a87-aa4d-4066-b23d-9b810a5c00bd', name: '系統管理者', role: 'inspector' };
    document.getElementById('navUser').textContent = currentUser.name;

    setStatus('載入週期…');
    const { data: cycle, error: cErr } = await db.from('inspection_cycles').select('*').is('ended_at', null).order('started_at', { ascending: false }).limit(1).single();
    if (cErr && cErr.code !== 'PGRST116') throw new Error('inspection_cycles 查詢失敗: ' + cErr.message);
    currentCycle = cycle;

    setStatus('載入設備…');
    await loadEquipment();
    setupTabs();
    setupOfflineDetect();
    checkOfflineQueue();
  } catch (err) {
    console.error('[INIT ERROR]', err);
    showInitErr(err.message || String(err));
  }
})();

function setupOfflineDetect() {
  const update = () => {
    document.getElementById('offlineBanner').classList.toggle('show', !navigator.onLine);
  };
  window.addEventListener('online', () => { update(); syncOfflineData(); });
  window.addEventListener('offline', update);
  update();
}

function checkOfflineQueue() {
  const q = getOfflineQueue();
  const bar = document.getElementById('offlineSyncBar');
  document.getElementById('offlineCount').textContent = q.length;
  bar.style.display = q.length ? 'block' : 'none';
}

async function syncOfflineData() {
  if (!navigator.onLine) return;
  const q = getOfflineQueue();
  if (!q.length) return;
  let failed = [];
  for (const item of q) {
    const { error } = await db.from('inspection_records').insert(item);
    if (error) failed.push(item);
  }
  saveOfflineQueue(failed);
  checkOfflineQueue();
  if (!failed.length) { showToast('離線資料已同步！'); await loadEquipment(); }
  else showToast(`同步失敗 ${failed.length} 筆`, true);
}

let _allEqs = [];
let _inspectedMap = {};

async function loadEquipment() {
  const { data: eqs, error: eqErr } = await db.from('equipment').select('*').eq('status', 'active').order('name');
  if (eqErr) {
    document.getElementById('eqList').innerHTML = `<div style="text-align:center;color:var(--red);padding:40px 16px;font-family:var(--font-mono);font-size:.8rem;line-height:1.8">⚠ 設備資料載入失敗<br><span style="color:var(--text-dim);font-size:.72rem">${eqErr.message}</span><br><br><button onclick="loadEquipment()" style="padding:8px 20px;background:transparent;border:1px solid var(--cyan);color:var(--cyan);font-family:var(--font-mono);cursor:pointer;font-size:.72rem">重試</button></div>`;
    document.getElementById('pendingCount').textContent = 'ERROR';
    return;
  }
  if (!eqs || eqs.length === 0) {
    document.getElementById('eqList').innerHTML = `<div style="text-align:center;color:var(--text-dim);padding:40px 0;font-family:var(--font-mono);font-size:.8rem">尚無啟用中的設備<br><span style="font-size:.7rem">請在後台管理系統新增設備</span></div>`;
    document.getElementById('pendingCount').textContent = 'PENDING 0 / 0';
    document.getElementById('progressText').textContent = '0 / 0';
    return;
  }
  eqs.forEach(e => equipmentMap[e.equipment_id] = e);
  _allEqs = eqs;

  _inspectedMap = {};
  if (currentCycle) {
    const { data: recs } = await db.from('inspection_records').select('equipment_id,inspect_time,run_status').eq('cycle_id', currentCycle.cycle_id);
    (recs || []).forEach(r => _inspectedMap[r.equipment_id] = { inspect_time: r.inspect_time, run_status: r.run_status });
  }

  const inspectedIds = new Set(Object.keys(_inspectedMap));
  const done = eqs.filter(e => inspectedIds.has(e.equipment_id));
  const todo = eqs.filter(e => !inspectedIds.has(e.equipment_id));
  document.getElementById('pendingCount').textContent = `PENDING ${todo.length} / ${eqs.length}`;

  // Update progress bar
  const pct = eqs.length > 0 ? Math.round(done.length / eqs.length * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done.length} / ${eqs.length}`;

  renderEqList(eqs);

  const sel = document.getElementById('repairEqId');
  sel.innerHTML = eqs.map(e => `<option value="${e.equipment_id}">${e.name}</option>`).join('');
}

function renderEqList(eqs) {
  const inspectedIds = new Set(Object.keys(_inspectedMap));
  const fmtTime = iso => {
    if (!iso) return '';
    const d = new Date(iso);
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  };
  const todo = eqs.filter(e => !inspectedIds.has(e.equipment_id));
  const done = eqs.filter(e => inspectedIds.has(e.equipment_id));
  const html = [...todo, ...done].map(eq => {
    const rec = _inspectedMap[eq.equipment_id];
    const isDone = !!rec;
    const isAbnormal = isDone && rec.run_status === 'abnormal';
    const lightClass = !isDone ? 'amber' : (isAbnormal ? 'red' : 'green');
    const timeStr = isDone ? `<div class="eq-time">${isAbnormal ? '⚠ 異常 ' : '✓ '} ${fmtTime(rec.inspect_time)}</div>` : '';
    const badgeClass = !isDone ? 'badge-todo' : (isAbnormal ? 'badge-abnormal' : 'badge-done');
    const badgeText = !isDone ? 'PENDING' : (isAbnormal ? 'ABNORMAL' : 'DONE');
    return `<div class="eq-card" onclick="openInspectModal('${eq.equipment_id}')">
      <div class="light ${lightClass}"></div>
      <div class="eq-info">
        <div class="eq-name">${eq.name}</div>
        <div class="eq-loc">📍 ${eq.location || '位置未設定'}</div>
        ${timeStr}
      </div>
      <span class="eq-badge ${badgeClass}">${badgeText}</span>
    </div>`;
  }).join('');
  document.getElementById('eqList').innerHTML = html || '<div style="text-align:center;color:var(--text-dim);padding:40px 0;font-family:var(--font-mono)">NO EQUIPMENT DATA</div>';
}

function filterEqList() {
  const kw = (document.getElementById('eqSearch')?.value || '').trim().toLowerCase();
  if (!kw) {
    renderEqList(_allEqs);
    return;
  }
  const filtered = _allEqs.filter(e =>
    (e.name || '').toLowerCase().includes(kw) ||
    (e.location || '').toLowerCase().includes(kw)
  );
  renderEqList(filtered);
}

function setupTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const target = tab.dataset.tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('page-' + target).classList.add('active');
      if (target === 'scan') startQrScanner();
      else stopQrScanner();
    });
  });
}

function startQrScanner() {
  if (isScannerActive) return;
  document.getElementById('scan-result-form').style.display = 'none';
  document.getElementById('scan-prompt').style.display = 'block';

  htmlQrCode = new Html5Qrcode('qr-reader');
  htmlQrCode.start({ facingMode: 'environment' }, { fps: 10, qrbox: { width: 250, height: 250 } },
    (decodedText) => handleQrResult(decodedText),
    () => {}
  ).then(() => { isScannerActive = true; }).catch(err => {
    document.getElementById('scan-prompt').textContent = '無法存取相機：' + err;
  });
}

function stopQrScanner() {
  if (htmlQrCode && isScannerActive) {
    htmlQrCode.stop().catch(() => {});
    isScannerActive = false;
  }
}

function handleQrResult(qrText) {
  const eq = Object.values(equipmentMap).find(e => e.qr_code === qrText || e.equipment_id === qrText);
  if (!eq) { showToast('QR Code 不符合任何設備', true); return; }
  stopQrScanner();
  scannedEquipment = eq;
  scanStatus = null;
  document.getElementById('scan-eq-title').textContent = eq.name;
  document.getElementById('scan-result-form').style.display = 'block';
  document.getElementById('scan-prompt').style.display = 'none';
  document.getElementById('btn-normal').className = 'radio-btn';
  document.getElementById('btn-abnormal').className = 'radio-btn';
  document.getElementById('note-field').style.display = 'none';
  document.getElementById('photo-field').style.display = 'none';
  document.getElementById('abnormalNote').value = '';
  document.getElementById('photoInput').value = '';
  document.getElementById('photoPreview').innerHTML = '點此拍照或選擇圖片';
}

function selectStatus(s) {
  scanStatus = s;
  document.getElementById('btn-normal').className = 'radio-btn' + (s === 'normal' ? ' selected-normal' : '');
  document.getElementById('btn-abnormal').className = 'radio-btn' + (s === 'abnormal' ? ' selected-abnormal' : '');
  document.getElementById('note-field').style.display = s === 'abnormal' ? 'block' : 'none';
  document.getElementById('photo-field').style.display = s === 'abnormal' ? 'block' : 'none';
}

async function saveInspection() {
  if (!scanStatus) { showToast('請選擇運轉狀態', true); return; }
  if (scanStatus === 'abnormal' && !document.getElementById('abnormalNote').value.trim()) {
    showToast('請填寫異常說明', true); return;
  }
  if (scanStatus === 'abnormal' && !document.getElementById('photoInput').files[0]) {
    showToast('異常狀態請上傳照片', true); return;
  }
  const btn = document.getElementById('saveInspectBtn');
  btn.disabled = true;
  const photoFile = scanStatus === 'abnormal' ? document.getElementById('photoInput').files[0] : null;
  await doSaveInspection(scannedEquipment, scanStatus, document.getElementById('abnormalNote').value.trim(), photoFile);
  btn.disabled = false;
  document.getElementById('scan-result-form').style.display = 'none';
  document.getElementById('scan-prompt').style.display = 'block';
  startQrScanner();
}

function cancelScan() {
  scannedEquipment = null; scanStatus = null;
  document.getElementById('scan-result-form').style.display = 'none';
  document.getElementById('scan-prompt').style.display = 'block';
  startQrScanner();
}

function openInspectModal(eqId) {
  modalEquipment = equipmentMap[eqId];
  if (!modalEquipment) return;
  modalStatus = null;
  document.getElementById('modal-eq-name').textContent = modalEquipment.name;
  document.getElementById('modal-eq-loc').textContent = '📍 ' + (modalEquipment.location || '位置未設定');
  document.getElementById('modal-btn-normal').className = 'radio-btn';
  document.getElementById('modal-btn-abnormal').className = 'radio-btn';
  document.getElementById('modal-note-field').style.display = 'none';
  document.getElementById('modal-photo-field').style.display = 'none';
  document.getElementById('modalAbnormalNote').value = '';
  document.getElementById('modalPhotoInput').value = '';
  document.getElementById('modalPhotoPreview').innerHTML = '點此拍照或選擇圖片';
  document.getElementById('inspectModal').classList.add('show');
}

function selectModalStatus(s) {
  modalStatus = s;
  document.getElementById('modal-btn-normal').className = 'radio-btn' + (s === 'normal' ? ' selected-normal' : '');
  document.getElementById('modal-btn-abnormal').className = 'radio-btn' + (s === 'abnormal' ? ' selected-abnormal' : '');
  document.getElementById('modal-note-field').style.display = s === 'abnormal' ? 'block' : 'none';
  document.getElementById('modal-photo-field').style.display = s === 'abnormal' ? 'block' : 'none';
}

function closeModal() { document.getElementById('inspectModal').classList.remove('show'); }

async function saveModalInspection() {
  if (!modalStatus) { showToast('請選擇運轉狀態', true); return; }
  if (modalStatus === 'abnormal' && !document.getElementById('modalAbnormalNote').value.trim()) {
    showToast('請填寫異常說明', true); return;
  }
  if (modalStatus === 'abnormal' && !document.getElementById('modalPhotoInput').files[0]) {
    showToast('異常狀態請上傳照片', true); return;
  }
  const photoFile = modalStatus === 'abnormal' ? document.getElementById('modalPhotoInput').files[0] : null;
  const note = document.getElementById('modalAbnormalNote').value.trim();
  closeModal();
  await doSaveInspection(modalEquipment, modalStatus, note, photoFile);
}

async function doSaveInspection(eq, status, note, photoFile) {
  let photoUrl = null;
  if (photoFile) photoUrl = await uploadPhoto(photoFile, eq.equipment_id);

  const record = {
    equipment_id: eq.equipment_id,
    inspector_id: currentUser.user_id,
    cycle_id: currentCycle?.cycle_id || null,
    inspect_time: new Date().toISOString(),
    run_status: status,
    abnormal_note: note || null,
    photo_url: photoUrl,
    light_status: status === 'normal' ? 'green' : 'red',
  };

  if (navigator.onLine) {
    const { error } = await db.from('inspection_records').insert(record);
    if (error) { showToast('儲存失敗', true); return; }
    if (status === 'abnormal') await createRepairFromInspection(eq, note);
    showToast(`${eq.name} 已記錄`);
    await loadEquipment();
  } else {
    const q = getOfflineQueue();
    q.push(record);
    saveOfflineQueue(q);
    checkOfflineQueue();
    showToast(`${eq.name} 已暫存（離線）`);
    await loadEquipment();
  }
  await writeAudit('inspection_records', eq.equipment_id, 'insert', null, record);
}

async function uploadPhoto(file, equipmentId) {
  if (!file) return null;
  const ext = file.name.split('.').pop() || 'jpg';
  const path = `inspections/${equipmentId}/${Date.now()}.${ext}`;
  const { error } = await db.storage.from('inspection-photos').upload(path, file);
  if (error) { console.error('Photo upload error', error); return null; }
  return db.storage.from('inspection-photos').getPublicUrl(path).data.publicUrl;
}

function previewPhoto(inputId, previewId) {
  const file = document.getElementById(inputId).files[0];
  const preview = document.getElementById(previewId);
  if (!file) { preview.innerHTML = '點此拍照或選擇圖片'; return; }
  const reader = new FileReader();
  reader.onload = e => {
    preview.innerHTML = `<img src="${e.target.result}" style="max-width:100%;max-height:200px;object-fit:contain">`;
  };
  reader.readAsDataURL(file);
}

async function createRepairFromInspection(eq, faultDesc) {
  const repair = {
    source: 'inspection',
    equipment_id: eq.equipment_id,
    reporter: currentUser.name,
    phone: currentUser.phone || '',
    department: currentUser.department || '',
    fault_desc: faultDesc,
    status: 'pending',
    created_by: currentUser.user_id,
  };
  const { data: repairData, error } = await db.from('repair_requests').insert(repair).select().single();
  if (!error && repairData) {
    await db.from('maintenance_orders').insert({
      request_id: repairData.request_id,
      equipment_id: eq.equipment_id,
      status: 'pending',
    });
    await db.from('repair_requests').update({ status: 'transferred' }).eq('request_id', repairData.request_id);
    await writeAudit('repair_requests', repairData.request_id, 'insert', null, repair);
  }
}

async function submitRepair() {
  const eqId = document.getElementById('repairEqId').value;
  const reporter = document.getElementById('repairReporter').value.trim();
  const phone = document.getElementById('repairPhone').value.trim();
  const dept = document.getElementById('repairDept').value.trim();
  const fault = document.getElementById('repairFault').value.trim();
  if (!reporter || !fault) { showToast('請填寫報修人與故障說明', true); return; }

  const repair = {
    source: document.getElementById('repairSource').value,
    equipment_id: eqId,
    reporter, phone, department: dept, fault_desc: fault, status: 'pending',
    created_by: currentUser.user_id,
  };
  const { data, error } = await db.from('repair_requests').insert(repair).select().single();
  if (error) { showToast('送出失敗', true); return; }
  await db.from('maintenance_orders').insert({ request_id: data.request_id, equipment_id: eqId, status: 'pending' });
  await db.from('repair_requests').update({ status: 'transferred' }).eq('request_id', data.request_id);
  await writeAudit('repair_requests', data.request_id, 'insert', null, repair);
  showToast('報修單已送出');
  document.getElementById('repairReporter').value = '';
  document.getElementById('repairPhone').value = '';
  document.getElementById('repairDept').value = '';
  document.getElementById('repairFault').value = '';
}

async function writeAudit(table, recordId, action, before, after) {
  if (!currentUser) return;
  await db.from('audit_logs').insert({
    table_name: table, record_id: String(recordId), action,
    changes: { before, after }, operator_id: currentUser.user_id,
    source: navigator.userAgent.substring(0, 100),
  });
}

async function logout() {
  await db.auth.signOut();
  window.location.href = 'login.html';
}

function showToast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(() => { t.className = 'toast'; }, 2500);
}
</script>
